name: 'Setup R environment'
description: 'Sets up a complete R environment: R, pandoc, dotnet workaround, and renv or dependencies'

inputs:
  r-version:
    description: 'R version to install (e.g. "release", "devel", "4.3.1")'
    required: false
    default: 'release'
  use-public-rspm:
    description: 'Use public RStudio Package Manager'
    required: false
    default: 'true'
  setup-pandoc:
    description: 'Whether to install pandoc'
    required: false
    default: 'false'
  setup-tinytex:
    description: 'Whether to install TinyTeX (provides pdflatex for PDF manual builds)'
    required: false
    default: 'false'
  setup-quarto:
    description: 'Whether to install Quarto'
    required: false
    default: 'false'
  dotnet-version:
    description: '.NET SDK version to install on all runners (e.g. "8.0.x", "10.0.x"). Set to an empty string to skip the setup-dotnet step and use whatever the runner image ships with (which may be no .NET at all, e.g. on macOS).'
    required: false
    default: '8.0.x'
  ignore-renv:
    description: 'Skip renv setup if set to true'
    required: false
    default: 'false'
  extra-packages:
    description: >-
      CI tool packages (e.g., covr, pkgdown, rcmdcheck), one per line. For renv
      projects (all OSes), installed after renv restore into .libPaths()[1] so
      the check step finds them: only packages not already present are installed,
      and with upgrade = FALSE so the renv.lock-pinned dependency versions that
      restore just installed are preserved. For non-renv projects, forwarded to
      setup-r-dependencies.
    required: false
    default: ''

outputs:
  renv_detected:
    description: 'Whether renv.lock was detected'
    value: ${{ steps.check-renv.outputs.renv_detected }}
  installed-r-version:
    description: 'The installed R version'
    value: ${{ steps.setup-r.outputs.installed-r-version }}

runs:
  using: composite
  steps:
    - name: Setup .NET
      if: inputs.dotnet-version != ''
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Setup pandoc
      if: inputs.setup-pandoc == 'true'
      uses: r-lib/actions/setup-pandoc@v2

    - name: Setup Quarto
      if: inputs.setup-quarto == 'true'
      uses: quarto-dev/quarto-actions/setup@v2

    - name: Setup TinyTeX
      if: inputs.setup-tinytex == 'true'
      uses: r-lib/actions/setup-tinytex@v2

    - name: Setup R
      id: setup-r
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ inputs.r-version }}
        use-public-rspm: ${{ inputs.use-public-rspm }}

    - name: Check for renv.lock
      id: check-renv
      run: echo "renv_detected=$([ -f renv.lock ] && echo true || echo false)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Setup renv (Linux/macOS)
      if: steps.check-renv.outputs.renv_detected == 'true' && inputs.ignore-renv != 'true' && runner.os != 'Windows'
      uses: r-lib/actions/setup-renv@v2

    # Windows: point R_LIBS_USER to a cacheable absolute path and install
    # packages there via renv::restore(library=...) on cache miss.
    # On cache hit, R finds packages directly — no renv restore needed.
    - name: Configure R library for caching (Windows)
      if: steps.check-renv.outputs.renv_detected == 'true' && inputs.ignore-renv != 'true' && runner.os == 'Windows'
      shell: bash
      run: |
        R_LIB_PATH="${{ runner.temp }}/R-lib"
        mkdir -p "${R_LIB_PATH}"
        echo "R_LIBS_USER=${R_LIB_PATH}" >> $GITHUB_ENV
        echo "RENV_CONFIG_AUTOLOADER_ENABLED=FALSE" >> $GITHUB_ENV

    - name: Cache R library (Windows)
      if: steps.check-renv.outputs.renv_detected == 'true' && inputs.ignore-renv != 'true' && runner.os == 'Windows'
      id: cache-renv-win
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/R-lib
        key: r-lib-${{ runner.os }}-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('renv.lock') }}

    - name: Install packages from renv.lock (Windows, cache miss)
      if: steps.check-renv.outputs.renv_detected == 'true' && inputs.ignore-renv != 'true' && runner.os == 'Windows' && steps.cache-renv-win.outputs.cache-hit != 'true'
      shell: Rscript {0}
      env:
        PKGCACHE_HTTP_VERSION: '1.1'
      run: |
        lib <- Sys.getenv("R_LIBS_USER")
        if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv", lib = lib)
        renv::restore(library = lib)

    # Runs after both setup branches so the library is populated. .libPaths()[1]
    # is the library the check step reads on every OS (renv project lib on
    # Linux/macOS, redirected R_LIBS_USER on Windows). Installs only missing
    # packages: the Windows cache key excludes extra-packages, so a cache hit can
    # return a lib predating a newly-added tool.
    - name: Install extra CI tool packages (renv projects)
      if: inputs.extra-packages != '' && steps.check-renv.outputs.renv_detected == 'true' && inputs.ignore-renv != 'true'
      shell: Rscript {0}
      env:
        EXTRA_PACKAGES: ${{ inputs.extra-packages }}
        PKGCACHE_HTTP_VERSION: '1.1'
      run: |
        lib <- .libPaths()[1]
        specs <- strsplit(Sys.getenv("EXTRA_PACKAGES"), "\\s+")[[1]]
        specs <- specs[nzchar(specs)]
        # A bare name ("rcmdcheck") is skipped when already installed. A spec
        # carrying a source or version ("type::pkg", "owner/repo", "pkg@ref")
        # asks for a specific build that a namespace presence check cannot
        # validate, so always hand it to pak (which resolves the right version
        # and is idempotent) rather than skipping on a same-named package.
        present <- vapply(
          specs,
          function(s) !grepl("[:/@]", s) && requireNamespace(s, quietly = TRUE),
          logical(1)
        )
        missing <- specs[!present]
        if (length(missing) > 0L) {
          if (!requireNamespace("pak", quietly = TRUE)) {
            # r-lib binary repo avoids source compilation when no CRAN/RSPM
            # binary exists yet (e.g. days after a new R release).
            install.packages(
              "pak",
              lib = lib,
              repos = sprintf(
                "https://r-lib.github.io/p/pak/stable/%s/%s/%s",
                .Platform$pkgType,
                R.Version()$os,
                R.Version()$arch
              )
            )
          }
          # upgrade = FALSE preserves the renv.lock-pinned dep versions that
          # restore() just installed; without it pak could replace them and the
          # check would run against an off-lock library.
          pak::pkg_install(missing, lib = lib, upgrade = FALSE)
        }

    - name: Setup R dependencies
      if: steps.check-renv.outputs.renv_detected == 'false' || inputs.ignore-renv == 'true'
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        extra-packages: ${{ inputs.extra-packages }}
