name: 'Setup R environment'
description: 'Sets up a complete R environment: R, pandoc, dotnet workaround, and renv or dependencies'

inputs:
  r-version:
    description: 'R version to install (e.g. "release", "devel", "4.3.1")'
    required: false
    default: 'release'
  use-public-rspm:
    description: 'Use public RStudio Package Manager'
    required: false
    default: 'true'
  setup-pandoc:
    description: 'Whether to install pandoc'
    required: false
    default: 'false'
  setup-tinytex:
    description: 'Whether to install TinyTeX (provides pdflatex for PDF manual builds)'
    required: false
    default: 'false'
  setup-quarto:
    description: 'Whether to install Quarto'
    required: false
    default: 'false'
  dotnet-version:
    description: '.NET version to install on macOS (e.g. "8.0.x", "9.0.x")'
    required: false
    default: '8.0.x'
  ignore-renv:
    description: 'Skip renv setup if set to true'
    required: false
    default: 'false'
  required-packages:
    description: 'R packages that must be available after setup, one per line. For non-renv projects, installs via setup-r-dependencies. For renv projects, only verifies (errors with instructions if missing).'
    required: false
    default: ''

outputs:
  renv_detected:
    description: 'Whether renv.lock was detected'
    value: ${{ steps.check-renv.outputs.renv_detected }}
  installed-r-version:
    description: 'The installed R version'
    value: ${{ steps.setup-r.outputs.installed-r-version }}

runs:
  using: composite
  steps:
    - name: Setup .NET
      if: runner.os == 'macOS'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Setup pandoc
      if: inputs.setup-pandoc == 'true'
      uses: r-lib/actions/setup-pandoc@v2

    - name: Setup Quarto
      if: inputs.setup-quarto == 'true'
      uses: quarto-dev/quarto-actions/setup@v2

    - name: Setup TinyTeX
      if: inputs.setup-tinytex == 'true'
      uses: r-lib/actions/setup-tinytex@v2

    - name: Setup R
      id: setup-r
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ inputs.r-version }}
        use-public-rspm: ${{ inputs.use-public-rspm }}

    - name: Check for renv.lock
      id: check-renv
      run: echo "renv_detected=$([ -f renv.lock ] && echo true || echo false)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Setup renv (Linux/macOS)
      if: steps.check-renv.outputs.renv_detected == 'true' && inputs.ignore-renv != 'true' && runner.os != 'Windows'
      uses: r-lib/actions/setup-renv@v2

    # Windows: point R_LIBS_USER to a cacheable absolute path and install
    # packages there via renv::restore(library=...) on cache miss.
    # On cache hit, R finds packages directly — no renv restore needed.
    - name: Configure R library for caching (Windows)
      if: steps.check-renv.outputs.renv_detected == 'true' && inputs.ignore-renv != 'true' && runner.os == 'Windows'
      shell: bash
      run: |
        R_LIB_PATH="${{ runner.temp }}/R-lib"
        mkdir -p "${R_LIB_PATH}"
        echo "R_LIBS_USER=${R_LIB_PATH}" >> $GITHUB_ENV
        echo "RENV_CONFIG_AUTOLOADER_ENABLED=FALSE" >> $GITHUB_ENV

    - name: Cache R library (Windows)
      if: steps.check-renv.outputs.renv_detected == 'true' && inputs.ignore-renv != 'true' && runner.os == 'Windows'
      id: cache-renv-win
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/R-lib
        key: r-lib-${{ runner.os }}-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('renv.lock') }}

    - name: Install packages from renv.lock (Windows, cache miss)
      if: steps.check-renv.outputs.renv_detected == 'true' && inputs.ignore-renv != 'true' && runner.os == 'Windows' && steps.cache-renv-win.outputs.cache-hit != 'true'
      shell: Rscript {0}
      run: |
        lib <- Sys.getenv("R_LIBS_USER")
        if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv", lib = lib)
        renv::restore(library = lib)

    - name: Setup R dependencies
      if: steps.check-renv.outputs.renv_detected == 'false' || inputs.ignore-renv == 'true'
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        extra-packages: ${{ inputs.required-packages }}

    - name: Verify required packages
      if: inputs.required-packages != ''
      shell: Rscript {0}
      env:
        REQUIRED_PACKAGES: ${{ inputs.required-packages }}
        RENV_DETECTED: ${{ steps.check-renv.outputs.renv_detected }}
        IGNORE_RENV: ${{ inputs.ignore-renv }}
      run: |
        required <- strsplit(Sys.getenv("REQUIRED_PACKAGES"), "\\s+")[[1]]
        required <- required[nzchar(required)]
        if (length(required) == 0L) quit("no")

        missing <- required[!vapply(required, requireNamespace, logical(1), quietly = TRUE)]
        if (length(missing) == 0L) quit("no")

        renv_active <- identical(Sys.getenv("RENV_DETECTED"), "true") &&
          !identical(tolower(Sys.getenv("IGNORE_RENV")), "true")

        pkgs_str <- paste(sprintf("'%s'", missing), collapse = ", ")
        pkgs_install <- paste(sprintf('"%s"', missing), collapse = ", ")

        if (renv_active) {
          msg <- paste(
            sprintf("Required packages not installed: %s", pkgs_str),
            "This project uses renv. To fix, run locally:",
            sprintf("  1. Add %s to 'Suggests' in DESCRIPTION", pkgs_str),
            sprintf("  2. renv::install(c(%s))", pkgs_install),
            "  3. renv::snapshot()",
            "  4. Commit the updated renv.lock",
            sep = "\n"
          )
        } else {
          msg <- paste(
            sprintf("Required packages not installed: %s", pkgs_str),
            sprintf("Add %s to 'Suggests' in DESCRIPTION", pkgs_str),
            sep = "\n"
          )
        }
        stop(msg, call. = FALSE)
