on:
  workflow_call:
    inputs:
      os-matrix:
        description: 'JSON array of {os, r} objects for the build matrix. Defaults to all three platforms with R release.'
        required: false
        type: string
        default: >-
          [{"os": "${{ vars.GHA_DEFAULT_RUNNER_WINDOWS || 'windows-latest' }}", "r": "release"},
          {"os": "${{ vars.GHA_DEFAULT_RUNNER_UBUNTU || 'ubuntu-latest' }}", "r": "release"},
          {"os": "${{ vars.GHA_DEFAULT_RUNNER_MACOS || 'macos-latest' }}", "r": "release"}]

name: R-CMD-check-released-deps.yaml

permissions: read-all

jobs:
  # Check the package against the latest *released* OSP dependencies. This runs
  # for every version, dev (x.y.z.NNNN) and release (x.y.z) alike: an
  # intermediate dev version must also be testable against released deps, so the
  # Remotes are pinned to @*release ephemerally below before the check.
  R-CMD-check-released-deps:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }}) [Released Deps]

    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.os-matrix) }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Checkout Workflows repo (for helper scripts)
        uses: actions/checkout@v6
        with:
          # Helper script from this workflow's own repo+commit (see comment in release-pr.yaml).
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .workflows-repo
          persist-credentials: false

      - name: Pin Remotes to released versions
        shell: bash
        run: |
          .workflows-repo/.github/scripts/manage_description.sh pin-remotes DESCRIPTION >/dev/null
          echo "Remotes pinned to released versions:"
          awk '/^Remotes:/{in_r=1; print; next} in_r && /^[^ \t]/{exit} in_r{print}' DESCRIPTION

      - name: Setup R environment
        id: setup-r-env
        uses: Open-Systems-Pharmacology/Workflows/.github/actions/setup-r-env@main
        with:
          r-version: ${{ matrix.config.r }}
          setup-pandoc: 'true'
          ignore-renv: 'true'
          extra-packages: |
            rcmdcheck

      - name: Check R package
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: 'c("--no-manual", "--no-vignettes")'
          build_args: 'c("--no-manual", "--no-build-vignettes")'
          error-on: 'c("error")'

      - name: Diagnostic message on failure
        if: failure()
        run: |
          echo "::warning::This workflow tests the package against the latest *released* versions of OSP dependencies."
          echo "::warning::If the main R-CMD-Check workflow passes but this one fails, it means the package works with development dependencies but not with the currently released ones."
          echo "::warning::A new release of one or more OSP dependencies is likely needed before this package can be released."
