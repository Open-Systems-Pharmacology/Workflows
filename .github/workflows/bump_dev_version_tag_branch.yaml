---
# DEPRECATED: superseded by bump-dev-version.yaml + publish-release.yaml.
#
# Why: the old all-in-one behaviour (bump dev version on push to main, plus tag
# release versions) is now two focused reusable workflows:
#   - bump-dev-version.yaml: bumps the dev version on push to main (uses a tested
#     helper script, richer step summary).
#   - publish-release.yaml: tags release versions and publishes a GitHub Release
#     (NEWS.md notes + per-OS binaries).
# (PR-time Remotes sync is a third workflow, sync-remotes.yaml, which this shim
# never performed and therefore does not call.)
#
# Migration: replace the single
#   uses: Open-Systems-Pharmacology/Workflows/.github/workflows/bump_dev_version_tag_branch.yaml@<ref>
# with two jobs:
#   uses: Open-Systems-Pharmacology/Workflows/.github/workflows/bump-dev-version.yaml@<ref>
#   uses: Open-Systems-Pharmacology/Workflows/.github/workflows/publish-release.yaml@<ref>
# Keep forwarding `app-id` / `private-key` only if the target branch is
# protected; otherwise the defaults (GITHUB_TOKEN) are sufficient and the
# inputs can be dropped.
#
# This shim keeps the old API alive: it forwards `app-id` / `private-key` to the
# bump workflow (which pushes to the protected default branch) so existing
# callers keep bumping and tagging without changes. publish-release tags via the
# default GITHUB_TOKEN and needs no App token.
name: bump_dev_version_tag_branch.yaml

on:
  workflow_call:
    inputs:
      app-id:
        type: string
        required: true
    secrets:
      private-key:
        required: true

jobs:
  deprecation-notice:
    if: github.event_name == 'push'
    runs-on: ${{ vars.GHA_DEFAULT_RUNNER_UBUNTU || 'ubuntu-latest' }}
    steps:
      - name: Emit deprecation warning
        run: |
          echo "::warning title=Deprecated workflow::bump_dev_version_tag_branch.yaml is deprecated. Migrate callers to .github/workflows/bump-dev-version.yaml (bump) + .github/workflows/publish-release.yaml (release). Keep forwarding app-id / private-key only when pushing to a protected branch."

  bump:
    needs: deprecation-notice
    uses: ./.github/workflows/bump-dev-version.yaml
    permissions:
      contents: write
    with:
      app-id: ${{ inputs.app-id }}
    secrets:
      private-key: ${{ secrets.private-key }}

  release:
    needs: deprecation-notice
    uses: ./.github/workflows/publish-release.yaml
    permissions:
      contents: write
      actions: read
