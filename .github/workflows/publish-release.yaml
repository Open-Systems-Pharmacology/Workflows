---
# Reusable workflow that publishes a release: tag + GitHub Release + assets.
#
# When the checked-out commit's DESCRIPTION carries a release Version (x.y.z, no
# trailing .NNNN dev component), it force-pushes a vX.Y.Z tag at that commit and
# creates/updates a matching GitHub Release, with notes from NEWS.md and the
# per-OS binary packages attached. Dev versions (x.y.z.NNNN) are skipped.
# Forcing makes a re-run re-point an existing tag/release onto the current commit
# instead of failing.
#
# Triggering is the caller's choice: wire this on push to the default branch,
# on workflow_dispatch, or both, from your own workflow. This reusable workflow
# does not filter by event itself.
#
# Pushing the tag and publishing the Release use the default GITHUB_TOKEN, so no
# GitHub App token is needed. (Note: a tag pushed with GITHUB_TOKEN does not
# trigger other `on: push: tags` workflows; if you rely on tag-triggered
# workflows or protect tags against GITHUB_TOKEN, tag from a job that uses an App
# token / PAT instead.)
#
# Remotes pinning lives in sync-remotes.yaml; the dev version bump in
# bump-dev-version.yaml.
name: publish-release.yaml

on:
  workflow_call:

jobs:
  publish-release:
    concurrency: # prevent concurrent runs on the same ref
      group: ${{ github.workflow }}-${{ github.ref }}
    runs-on: ${{ vars.GHA_DEFAULT_RUNNER_UBUNTU || 'ubuntu-latest' }}
    permissions:
      contents: write   # push tag, create/update release
      actions: read     # download-artifact reads the run's artifacts
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          # Full history so existing tags are present for the force-update.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Workflows repo (for helper scripts)
        uses: actions/checkout@v6
        with:
          repository: Open-Systems-Pharmacology/Workflows
          ref: main
          path: .workflows-repo

      - name: Detect release version
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          # Reuse the helper's single dev/release classification (one regex).
          eval "$(.workflows-repo/.github/scripts/manage_description.sh detect-version DESCRIPTION 2>/dev/null)"
          if [ "$IS_DEV_VERSION" = "true" ]; then
            # Dev version: nothing to release. Stay silent (no-op).
            echo "is-release=false" >> "$GITHUB_OUTPUT"
          else
            echo "is-release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Force-push release tag
        if: steps.detect.outputs.is-release == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.detect.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tag="v${VERSION}"
          git tag -f "$tag" "$SHA"
          git push --force origin "$tag"
          echo "::notice title=Tag pushed::Pushed tag $tag at ${SHA}"

      # Pull the binary packages R-CMD-check-build.yaml uploaded earlier in the
      # SAME run (artifacts named `<pkg>-v<version>-<os>-r_<rver>`). The caller
      # must run the build job first and make this workflow `needs:` it; see the
      # caller-wiring note in docs/description-tagging-rethink.md. The step is
      # best-effort: if no matching artifacts exist (build skipped, build-binary
      # false, or a standalone dispatch), the release is still published without
      # assets.
      - name: Download built artifacts
        id: assets
        if: steps.detect.outputs.is-release == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          # Only this version's artifacts; flatten every OS's package file into
          # one directory so they can be attached together.
          pattern: '*-v${{ steps.detect.outputs.version }}-*'
          path: release-assets
          merge-multiple: true

      # Replicate usethis::use_github_release() (a published Release named after
      # the version, with notes from NEWS.md) but non-interactively, and attach
      # the per-OS binary packages. Create the Release on first run; update it
      # (notes + target + assets) on re-runs so the step is idempotent, matching
      # the force-pushed tag above.
      - name: Create or update GitHub Release
        id: release
        if: steps.detect.outputs.is-release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.detect.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          notes_file="$(mktemp)"

          # Pull the matching NEWS.md section; fall back to a generated note when
          # NEWS.md is absent or has no section for this version (silently).
          .workflows-repo/.github/scripts/extract_news.sh "$VERSION" NEWS.md > "$notes_file"
          if [ ! -s "$notes_file" ]; then
            printf 'Release %s\n' "$tag" > "$notes_file"
          fi

          # Collect any downloaded package files to attach as assets.
          assets=()
          if [ -d release-assets ]; then
            while IFS= read -r -d '' f; do assets+=("$f"); done \
              < <(find release-assets -type f -print0)
          fi
          echo "asset-count=${#assets[@]}" >> "$GITHUB_OUTPUT"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --target "$SHA" \
              --title "$tag" \
              --notes-file "$notes_file"
            # --clobber replaces same-named assets so re-runs stay idempotent.
            if [ "${#assets[@]}" -gt 0 ]; then
              gh release upload "$tag" "${assets[@]}" --clobber
            fi
            echo "::notice title=Release updated::Updated GitHub Release $tag (${#assets[@]} asset(s))"
            echo "action=updated" >> "$GITHUB_OUTPUT"
          else
            # Branch on assets so "${assets[@]}" is never expanded while empty
            # (that aborts under `set -u` on bash < 4.4).
            if [ "${#assets[@]}" -gt 0 ]; then
              gh release create "$tag" \
                --target "$SHA" --title "$tag" --notes-file "$notes_file" \
                --verify-tag "${assets[@]}"
            else
              gh release create "$tag" \
                --target "$SHA" --title "$tag" --notes-file "$notes_file" \
                --verify-tag
            fi
            echo "::notice title=Release created::Created GitHub Release $tag (${#assets[@]} asset(s))"
            echo "action=created" >> "$GITHUB_OUTPUT"
          fi

      # Summarise only when a release was actually published. On a dev version
      # the release steps were skipped (no-op), so emit nothing.
      - name: Report
        if: steps.detect.outputs.is-release == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.detect.outputs.version }}
          SHA: ${{ github.sha }}
          RELEASE_ACTION: ${{ steps.release.outputs.action }}
          ASSET_COUNT: ${{ steps.release.outputs.asset-count }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          tag_url="${SERVER_URL}/${REPO}/releases/tag/v${VERSION}"
          short_sha="${SHA:0:7}"
          {
            echo "## Release ${VERSION}"
            echo ""
            echo "- **Tag:** [\`v${VERSION}\`](${tag_url}) at \`${short_sha}\`"
            echo "- **Release:** ${RELEASE_ACTION} ([\`v${VERSION}\`](${tag_url}))"
            echo "- **Assets attached:** ${ASSET_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"
