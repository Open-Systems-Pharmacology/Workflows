# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples

on:
  workflow_call:
    inputs:
      ignore-renv:
        description: 'Skip renv setup if set to true'
        required: false
        type: boolean
        default: false
      doc-path-filters:
        description: 'YAML string for dorny/paths-filter. On PRs, pkgdown is skipped when none of these paths changed. Ignored on push events.'
        required: false
        type: string
        default: |
          docs:
            - 'man/**'
            - 'vignettes/**'
            - '_pkgdown.yml'
            - '_pkgdown.yaml'
            - 'pkgdown/**'
            - 'README.md'
            - 'DESCRIPTION'
            - 'NEWS.md'
            - 'R/**'

name: pkgdown

jobs:
  check-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: ${{ inputs.doc-path-filters }}

  pkgdown:
    needs: [check-changes]
    if: ${{ !cancelled() && (github.event_name != 'pull_request' || needs.check-changes.outputs.docs == 'true') }}
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup R environment
        id: setup-r-env
        uses: Open-Systems-Pharmacology/Workflows/.github/actions/setup-r-env@main
        with:
          setup-pandoc: 'true'
          ignore-renv: ${{ inputs.ignore-renv }}

      - name: Install extra packages
        run: |
          if (!requireNamespace("pkgdown", quietly = TRUE)) {
            install.packages("pkgdown")
          }
          if (!requireNamespace("devtools", quietly = TRUE)) {
            install.packages("devtools")
          }
          devtools::install(".", upgrade = FALSE)
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
